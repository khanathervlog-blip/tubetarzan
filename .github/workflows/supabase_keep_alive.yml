name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 * * 1,4' # Runs every Monday and Thursday at midnight UTC
  workflow_dispatch: # Allows you to manually trigger it from GitHub to test it

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Request to Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/support_conversations?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"